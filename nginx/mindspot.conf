# nginx reverse-proxy for MindSpot
# ─────────────────────────────────────────────────────────────────────────────
# Forwards HTTP traffic from port 80 to the Dockerized .NET app on port 7160.
# WebSocket upgrade is required for SignalR real-time chat.
#
# Place this file at:  /etc/nginx/sites-available/mindspot
# Enable with:  sudo ln -s /etc/nginx/sites-available/mindspot /etc/nginx/sites-enabled/
# Reload with:  sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Needed for WebSocket (SignalR) — maps Upgrade header to Connection header.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name mindspot.duckdns.org;

    # Optional: redirect bare IP access to the named domain
    # if ($host != "mindspot.duckdns.org") {
    #     return 301 $scheme://mindspot.duckdns.org$request_uri;
    # }

    # ── Proxy all requests → MindSpot Docker app ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:7160;
        proxy_http_version 1.1;

        # WebSocket / SignalR upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Standard reverse-proxy headers so ASP.NET Core sees the real client IP
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Long timeout for SignalR long-polling fallback (should use WebSocket)
        proxy_read_timeout 86400s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}
